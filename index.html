<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consentimiento de Redirección</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .accept {
            background-color: #667eea;
            color: white;
        }
        .accept:hover {
            background-color: #5568d3;
        }
        .decline {
            background-color: #e0e0e0;
            color: #333;
        }
        .decline:hover {
            background-color: #d0d0d0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ Aviso Importante</h1>
        <p>
            Esta página te redirigirá a <strong>example.com</strong>. 
            ¿Deseas continuar?
        </p>
        <div class="button-group">
            <button class="accept" onclick="redirect()">Aceptar y continuar</button>
            <button class="decline" onclick="decline()">Rechazar</button>
        </div>
    </div>

    <script>
        function redirect() {
            window.location.href = 'https://example.com';
        }
        function decline() {
            alert('Redirección cancelada.');
        }
    </script>
</body>
</html>
